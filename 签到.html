<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>扫码签到</title>
<style>
body{font-family:微软雅黑;padding:30px;background:#f5f5f5}
.container{max-width:400px;margin:0 auto;background:white;padding:30px;border-radius:16px}
input{width:100%;padding:12px;margin:10px 0;font-size:16px}
button{width:100%;padding:12px;background:#007bff;color:white;border:none;border-radius:8px}
.record{margin-top:20px;padding:10px;background:#f8f9fa}
</style>
</head>
<body>
<div class="container">
  <h3>签到系统</h3>
  <input type="text" id="name" placeholder="输入你的姓名">
  <input type="text" id="code" placeholder="扫描签到码后粘贴这里">
  <button onclick="sign()">提交签到</button>
  <div class="record" id="record"></div>
</div>

<script>
function sign() {
  let name = document.getElementById("name").value;
  let code = document.getElementById("code").value;
  if(!name || !code) {
    alert("请填写姓名和签到码");
    return;
  }
  let time = new Date().toLocaleString();
  let msg = time + " → " + name + " 签到成功！\n";
  document.getElementById("record").innerText += msg;
  alert("签到成功！");
}
</script>
</body>
</html>

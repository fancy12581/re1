<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>动态签到码</title>
<script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{font-family:微软雅黑;padding:30px;background:#f5f5f5}
.container{max-width:400px;margin:0 auto;background:white;padding:30px;border-radius:16px}
#qrcode{margin:20px auto;width:300px;height:300px}
.title{font-size:20px;text-align:center;margin-bottom:10px}
.tip{color:red;text-align:center;font-size:16px}
</style>
</head>
<body>
<div class="container">
  <div class="title">动态签到码（自动刷新）</div>
  <div id="qrcode"></div>
  <div class="tip" id="info">倒计时：10秒</div>
</div>

<script>
let qrcode;
let currentToken = "";

function init() {
  qrcode = new QRCode(document.getElementById("qrcode"), {
    width:300, height:300,
    colorDark:"#000", colorLight:"#fff"
  });
}

function generateToken() {
  currentToken = "sign_" + Date.now();
  qrcode.makeCode(currentToken);
  startCount();
}

let count = 100;
function startCount() {
  count = 10;
  let timer = setInterval(()=>{
    count--;
    document.getElementById("info").innerText = "倒计时："+count+"秒后刷新";
    if(count <= 0) {
      clearInterval(timer);
      generateToken();
    }
  },1000);
}

init();
generateToken();
</script>
</body>
</html>
